spring.application.name=auth-service

# In-memory H2 with PostgreSQL compatibility; JPA entities use schema "auth"
#spring.datasource.url=jdbc:h2:mem:securepay;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
#spring.datasource.driver-class-name=org.h2.Driver
#spring.datasource.username=sa
#spring.datasource.password=

# THIS IS  THE DATABSE SETUP
# PostgreSQL DB config
spring.datasource.url=jdbc:postgresql://localhost:5433/securepay
spring.datasource.username=postgres
spring.datasource.password=user
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.default_schema=auth

# Optional: create schema automatically
spring.jpa.properties.hibernate.hbm2ddl.create_namespaces=true

##### 
#spring.jpa.hibernate.ddl-auto=create-drop
#spring.jpa.open-in-view=false
#spring.jpa.show-sql=false
#spring.jpa.properties.hibernate.default_schema=auth
## schema.sql creates auth; avoid duplicate "create schema" from Hibernate on H2
#spring.jpa.properties.hibernate.hbm2ddl.create_namespaces=false

# Ensure auth schema exists before Hibernate ddl-auto (fixes H2 "Schema auth not found" on create-drop)
spring.sql.init.mode=always
spring.sql.init.continue-on-error=true

# JWT (secret must be >= 256 bits for HS256)
jwt.secret=dev-only-change-me-0123456789abcdef0123456789abcdef
jwt.access-token-expiry-ms=900000
jwt.refresh-token-expiry-ms=604800000

auth.executor.core-pool-size=4
auth.executor.max-pool-size=8
auth.executor.queue-capacity=100

auth.risk.unknown-device-score=40
auth.risk.unusual-time-score=20
auth.risk.concurrent-session-score=30
auth.risk.unusual-hour-start=1
auth.risk.unusual-hour-end=5
